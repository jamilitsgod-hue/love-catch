<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💥 LOVE CATCH EXTREME 💥</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: Arial;
    background: linear-gradient(135deg,#ff1744,#f50057,#c51162);
    height:100vh; display:flex; justify-content:center; align-items:center;
}
.game-container {
    text-align:center; background:#fff;
    padding:30px; border-radius:20px;
    max-width:600px; width:95%;
}
h1 { font-size:3em; color:#d500f9; margin-bottom:20px; }

#startScreen button {
    padding:25px 60px;
    font-size:2em;
    border-radius:50px;
    border:none;
    background:#00e676;
    cursor:pointer;
}

.game-area {
    width:100%; height:400px;
    border:4px solid red;
    position:relative;
    overflow:hidden;
    margin-top:20px;
}

.emoji {
    position:absolute;
    font-size:40px;
    cursor:pointer;
}

.info {
    display:flex;
    justify-content:space-between;
    margin-top:10px;
    font-size:20px;
}

.game-over {
    display:none;
}
</style>
</head>

<body>

<div class="game-container">
<h1>💥 LOVE CATCH 💥</h1>

<div id="startScreen">
    <button onclick="startGame()">🚀 START</button>
</div>

<div id="gameInfo" style="display:none;">
    <div class="info">
        ⏰ <span id="timer">5</span>
        ❤️ <span id="score">0</span>/100
    </div>
    <div class="game-area" id="gameArea"></div>
</div>

<div id="gameOver" class="game-over">
    <h2 id="result"></h2>
    <button onclick="restartGame()">Main Lagi</button>
</div>
</div>

<script>
let time = 5;
let score = 0;
let timer;
let spawn;

const area = document.getElementById("gameArea");

function startGame(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("gameInfo").style.display="block";

    score = 0;
    time = 5;
    document.getElementById("score").innerText=0;
    document.getElementById("timer").innerText=5;

    timer = setInterval(()=>{
        time--;
        document.getElementById("timer").innerText=time;
        if(time<=0) endGame();
    },1000);

    spawn = setInterval(createEmoji,150);
}

function createEmoji(){
    const e = document.createElement("div");
    e.className="emoji";
    e.innerText="❤️";

    e.style.left=Math.random()*300+"px";
    e.style.top=Math.random()*300+"px";

    e.onclick=()=>{
        score++;
        document.getElementById("score").innerText=score;
        e.remove();
    };

    area.appendChild(e);

    setTimeout(()=>e.remove(),1000);
}

function endGame(){
    clearInterval(timer);
    clearInterval(spawn);

    document.getElementById("gameInfo").style.display="none";
    document.getElementById("gameOver").style.display="block";

    if(score>=100){
        document.getElementById("result").innerText="MENANG!";
    } else {
        document.getElementById("result").innerText="KALAH 😭 ("+score+")";
    }
}

function restartGame(){
    location.reload();
}
</script>

</body>
</html>
